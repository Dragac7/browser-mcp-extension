<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #333;
    }
    h3 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #1a1a1a;
    }
    label {
      display: block;
      margin-bottom: 3px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 6px 8px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #4a90d9;
    }
    .actions {
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      padding: 6px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f5f5f5;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover {
      background: #e8e8e8;
    }
    button.primary {
      background: #4a90d9;
      border-color: #4a90d9;
      color: #fff;
    }
    button.primary:hover {
      background: #3a7bc8;
    }
    .status {
      margin-top: 8px;
      padding: 6px;
      border-radius: 4px;
      text-align: center;
      font-size: 12px;
      display: none;
    }
    .status.ok {
      display: block;
      background: #e8f5e9;
      color: #2e7d32;
    }
    .status.cleared {
      display: block;
      background: #fff3e0;
      color: #e65100;
    }
  </style>
</head>
<body>
  <h3>WebSocket Config</h3>
  <label for="port">Port</label>
  <input type="number" id="port" min="1024" max="65535" placeholder="9001">
  <label for="token">Token</label>
  <input type="text" id="token" placeholder="(empty = no auth)">
  <div class="actions">
    <button id="clear">Clear</button>
    <button id="save" class="primary">Save</button>
  </div>
  <div id="status" class="status"></div>
  <script src="popup.js"></script>
</body>
</html>
